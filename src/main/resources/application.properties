spring.application.name=ProyectoAPPWEB


# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8081


# ===============================
# CONFIGURACIÓN DE MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ms_incidencias?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# Cambia "root" por tu contraseña real de MySQL
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN DE HIBERNATE / JPA
# ===============================
# "update" crea la tabla si no existe y la actualiza si agregas campos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURACIÓN DE RABBITMQ
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest